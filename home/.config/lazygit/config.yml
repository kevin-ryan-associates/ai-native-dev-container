# lazygit config -- neon-dark theme
# matches the aidev palette: cyan / green / magenta / blue / amber / red on near-black

gui:
  # Nerd Fonts v3 icons (matches eza / starship / fzf setup).
  nerdFontsVersion: "3"

  theme:
    # Border of the focused panel -- neon cyan, bold.
    activeBorderColor:
      - "#00e5ff"
      - bold

    # Border of non-focused panels -- dim, recedes into the background.
    inactiveBorderColor:
      - "#5a6473"

    # Border of the focused panel while searching in it -- neon magenta.
    searchingActiveBorderColor:
      - "#ff00c8"
      - bold

    # Keybindings help text along the bottom line -- electric blue.
    optionsTextColor:
      - "#3c78ff"

    # Background of the selected line -- dark git panel tone.
    selectedLineBgColor:
      - "#1a1f29"

    # Background of the selected line in an unfocused view -- dark dir panel tone.
    inactiveViewSelectedLineBgColor:
      - "#161b22"

    # Cherry-picked commit (copied) -- cyan text on dark panel.
    cherryPickedCommitFgColor:
      - "#00e5ff"
    cherryPickedCommitBgColor:
      - "#11141a"

    # Marked base commit for rebase -- blue text on amber.
    markedBaseCommitFgColor:
      - "#3c78ff"
    markedBaseCommitBgColor:
      - "#ffb000"

    # Files with unstaged changes -- neon red.
    unstagedChangesColor:
      - "#ff4070"

    # Default text colour -- bright, cool grey.
    defaultFgColor:
      - "#c8d2dc"
